{% extends 'base.html' %}

{% block title %} SIPUSTAKA - Edit Buku {% endblock %}

{% block content %}
    <header class="mb-6">
        <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
            <a href="{% url 'buku_list' %}" class="hover:text-blue-600 flex items-center transition">
                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kelola Buku
            </a>
        </div>
        <h1 class="text-2xl font-bold text-slate-900">Edit Buku</h1>
    </header>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-4xl">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Judul Buku</label>
                    <input type="text" name="judul" value="{{ form.judul.value|default:buku.judul }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Masukkan judul buku">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Pengarang</label>
                    <input type="text" name="pengarang" value="{{ form.pengarang.value|default:buku.pengarang }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Nama pengarang">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Kategori</label>
                    <div class="relative">
                        <select name="kategori" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition appearance-none cursor-pointer">
                            <option value="Novel" {% if buku.kategori == "Novel" %}selected{% endif %}>Novel</option>
                            <option value="Sains" {% if buku.kategori == "Sains" %}selected{% endif %}>Sains</option>
                            <option value="Sejarah" {% if buku.kategori == "Sejarah" %}selected{% endif %}>Sejarah</option>
                            <option value="Komputer" {% if buku.kategori == "Komputer" %}selected{% endif %}>Komputer</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="fill-current h-4 w-4" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Penerbit</label>
                    <input type="text" name="penerbit" value="{{ form.penerbit.value|default:buku.penerbit }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Nama penerbit">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Tahun Terbit</label>
                    <input type="number" name="tahun" value="{{ form.tahun.value|default:buku.tahun_terbit }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Contoh: 2024">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Stok</label>
                    <input type="number" name="stok" value="{{ form.stok.value|default:buku.stok }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Jumlah stok">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">ISBN</label>
                    <input type="text" name="isbn" value="{{ form.isbn.value|default:buku.isbn }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Kode ISBN">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">Rak / Lokasi</label>
                    <input type="text" name="lokasi_rak" value="{{ form.lokasi_rak.value|default:buku.lokasi_rak }}" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Contoh: Rak A-01">
                </div>

            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500">Deskripsi</label>
                <textarea name="deskripsi" rows="4" class="w-full bg-slate-50 border border-slate-200/80 rounded-xl px-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition resize-none" placeholder="Tulis sinopsis atau deskripsi buku...">{{ form.deskripsi.value|default:buku.deskripsi }}</textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <a href="{% url 'buku_list' %}" class="px-6 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium text-sm rounded-xl transition">
                    Batal
                </a>
                <button type="submit" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-xl shadow-md shadow-blue-600/10 transition">
                    Perbarui Buku
                </button>
            </div>

        </form>
    </div>
{% endblock %}
