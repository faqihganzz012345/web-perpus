{% extends 'base.html' %}

{% block title %}
    SIPUSTAKA - {% if user_data.id %}Edit User{% else %}Tambah User{% endif %}
{% endblock %}

{% block content %}
    <header class="mb-6 flex items-center gap-3">
        <a href="{% url 'user_list' %}" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </a>
        <div>
            <p class="text-xs text-slate-400 mb-0.5">Kelola User</p>
            <h1 class="text-xl font-bold text-slate-900">
                {% if user_data.id %}Edit User{% else %}Tambah User{% endif %}
            </h1>
        </div>
    </header>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 max-w-4xl">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-3">
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Nama Lengkap</label>
                    <input type="text" name="nama" value="{{ user_data.nama|default:'' }}" required placeholder="Contoh: Roni"
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Kelas</label>
                    <input type="text" name="kelas" value="{{ user_data.kelas|default:'' }}" required placeholder="Contoh: XI IPA 1"
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">NIS (Nomor Induk Siswa)</label>
                    <input type="text" name="nis" value="{{ user_data.nis|default:'' }}" required placeholder="Contoh: 2026001"
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Status</label>
                    <select name="status" required
                            class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition appearance-none">
                        <option value="Aktif" {% if user_data.status == "Aktif" or not user_data.status %}selected{% endif %}>Aktif</option>
                        <option value="Tidak Aktif" {% if user_data.status == "Tidak Aktif" %}selected{% endif %}>Tidak Aktif</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1 md:col-span-2">
                    <label class="text-xs font-semibold text-slate-500">Aksi / Log Catatan</label>
                    <input type="text" name="aksi" value="{{ user_data.aksi|default:'Kontrol' }}" required placeholder="Default: Kontrol"
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>

            </div>
            
            <div class="flex justify-end gap-2.5 pt-4 border-t border-slate-100">
                <a href="{% url 'user_list' %}" 
                   class="px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold text-xs rounded-xl transition">
                    Batal
                </a>
                <button type="submit" 
                        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-xs rounded-xl shadow-sm transition">
                    {% if user_data.id %}Perbarui User{% else %}Simpan User{% endif %}
                </button>
            </div>
        </form>
    </div>
{% endblock %}
