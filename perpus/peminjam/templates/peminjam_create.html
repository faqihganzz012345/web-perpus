{% extends 'base.html' %}

{% block title %} SIPUSTAKA - Tambah Peminjam {% endblock %}

{% block content %}
    <header class="mb-6 flex items-center gap-3">
        <a href="{% url 'peminjam_list' %}" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </a>
        <div>
            <p class="text-xs text-slate-400 mb-0.5">Kelola Transaksi</p>
            <h1 class="text-xl font-bold text-slate-900">Tambah Peminjam</h1>
        </div>
    </header>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 max-w-4xl">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-3">
                
                <div class="flex flex-col gap-1.5">
    <label class="text-xs font-semibold text-slate-500">Nama Peminjam</label>
    <div class="relative">
        <select name="nama_peminjam" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition appearance-none cursor-pointer">
            <option value="">-- Pilih Anggota / User --</option>
            {% for user in daftar_user %}
                <option value="{{ user.nama }}">{{ user.nama }}</option>
            {% endfor %}
        </select>
    </div>
</div>
                
                <div class="flex flex-col gap-1.5">
    <label class="text-xs font-semibold text-slate-500">Judul Buku</label>
    <div class="relative">
        <select name="buku" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition appearance-none cursor-pointer">
            <option value="">-- Pilih Buku yang Dipinjam --</option>
            {% for buku in data %}
                <option value="{{ buku.judul }}" 
                        {% if buku.stok|add:"0" <= 0 %} disabled class="text-slate-400 bg-slate-100" {% endif %}
                        {% if query_sekarang == buku.judul %} selected {% endif %}>
                    {{ buku.judul }} 
                    ({% if buku.stok|add:"0" > 0 %}Stok: {{ buku.stok }}{% else %}Stok Habis / Kosong{% endif %})
                </option>
            {% endfor %}
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
        </div>
    </div>
</div>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Tanggal Pinjam</label>
                    <input type="date" name="tanggal_pinjam" required
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Tanggal Jatuh Tempo</label>
                    <input type="date" name="jatuh_tempo" required
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Petugas Perpustakaan</label>
                    <input type="text" name="petugas" required placeholder="Nama petugas jaga"
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-slate-500">Status</label>
                    <select name="status" required
                            class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition appearance-none">
                        <option value="Dipinjam" selected>Dipinjam</option>
                        <option value="Kembali">Kembali</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1 md:col-span-2">
                    <label class="text-xs font-semibold text-slate-500">Keperluan</label>
                    <input type="text" name="keperluan" required placeholder="Contoh: Tugas Mandiri Bahasa Indonesia"
                           class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                </div>

            </div>
            
            <div class="flex justify-end gap-2.5 pt-4 border-t border-slate-100">
                <a href="{% url 'peminjam_list' %}" 
                   class="px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold text-xs rounded-xl transition">
                    Batal
                </a>
                <button type="submit" 
                        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-xs rounded-xl shadow-sm transition">
                    Simpan Transaksi
                </button>
            </div>
        </form>
    </div>
{% endblock %}
