<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIPUSTAKA{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f6fa] text-slate-800 antialiased m-0 p-0">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#0b0f19] text-white p-4 flex flex-col justify-between shrink-0 fixed h-full z-10">
            <div>
                <div class="flex items-center gap-3 mb-10 pl-2 pt-2">
                    <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center font-bold text-base text-white">
                        P
                    </div>
                    <div>
                        <span class="block text-[10px] text-slate-500 tracking-wider font-semibold">SIPUSTAKA</span>
                        <span class="block text-sm font-semibold text-slate-200 leading-tight">Sistem Peminjaman Buku</span>
                    </div>
                </div>

                <nav class="space-y-2">
    <a href="{% url 'buku_list' %}?page=buku" 
       class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg transition {% if request.GET.page == 'buku' or not request.GET.page %} text-white bg-[#1a2333] {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
        <svg class="w-4 h-4 {% if request.GET.page == 'buku' or not request.GET.page %} text-white {% else %} text-slate-500 {% endif %}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        Buku
    </a>
    
    <a href="{% url 'peminjam_list' %}?page=peminjaman" 
       class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg transition {% if request.GET.page == 'peminjaman' %} text-white bg-[#1a2333] {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
        <svg class="w-4 h-4 {% if request.GET.page == 'peminjaman' %} text-white {% else %} text-slate-500 {% endif %}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"></path><path d="M4 20L21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
        Peminjaman
    </a>
    
    <a href="{% url 'user_list' %}?page=user" 
       class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg transition {% if request.GET.page == 'user' %} text-white bg-[#1a2333] {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
        <svg class="w-4 h-4 {% if request.GET.page == 'user' %} text-white {% else %} text-slate-500 {% endif %}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        User
    </a>
</nav>
            </div>

            <div class="bg-[#141b2d] p-4 rounded-xl mb-2">
                <span class="block text-[11px] text-slate-500 mb-1">Admin Aktif</span>
                <span class="block text-sm font-semibold text-slate-200">{% if request.user.is_authenticated %}{{ request.user.first_name }} {{ request.user.last_name }}{% else %}Budi Siregar{% endif %}</span>
            </div>
        </aside>

        <main class="flex-1 pl-72 pr-8 pt-8 pb-8 min-h-screen">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
