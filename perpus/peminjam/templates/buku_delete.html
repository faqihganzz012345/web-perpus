{% extends 'base.html' %}

{% block title %} SIPUSTAKA - Hapus Buku {% endblock %}

{% block content %}
    <header class="mb-6">
        <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
            <a href="{% url 'buku_list' %}" class="hover:text-blue-600 flex items-center transition">
                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kelola Buku
            </a>
        </div>
        <h1 class="text-2xl font-bold text-slate-900">Hapus Buku</h1>
    </header>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-2xl">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-1">
                <p class="text-sm text-slate-500 font-medium">Anda akan menghapus:</p>
                <h2 class="text-base font-bold text-slate-900">{{ buku.judul }}</h2>
                <p class="text-xs text-slate-400 pt-1">
                    Data peminjaman yang menggunakan buku ini tidak akan otomatis dihapus.
                </p>
            </div>

            <div class="flex justify-end gap-3 pt-6 border-t border-slate-100/80">
                <a href="{% url 'buku_list' %}" class="px-6 py-2.5 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-medium text-sm rounded-xl transition">
                    Batal
                </a>
                <button type="submit" class="px-6 py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-medium text-sm rounded-xl shadow-md shadow-rose-600/10 transition">
                    Hapus
                </button>
            </div>
        </form>
    </div>
{% endblock %}
